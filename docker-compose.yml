version: "3.9"

services:

  #################################################
  # PostgreSQL
  #################################################

  postgres:

    image: postgres:16

    container_name: banking_postgres

    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - banking_network

  #################################################
  # PGADMIN
  #################################################

  pgadmin:

    image: dpage/pgadmin4

    container_name: banking_pgadmin

    restart: always

    env_file:
      - .env

    environment:

      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}

      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - banking_network

  #################################################
  # AIRFLOW DATABASE
  #################################################

  airflow-db:

    image: postgres:16

    container_name: airflow_postgres

    restart: always

    environment:

      POSTGRES_USER: airflow

      POSTGRES_PASSWORD: airflow

      POSTGRES_DB: airflow

    ports:

      - "5433:5432"

    volumes:

      - airflow_postgres:/var/lib/postgresql/data

    networks:

      - banking_network

  #################################################
  # AIRFLOW
  #################################################

  airflow:

    build:

      context: .

      dockerfile: docker/Dockerfile

    container_name: banking_airflow

    restart: always

    env_file:

      - .env

    depends_on:

      - airflow-db

    ports:

      - "8080:8080"

    volumes:

      - ./airflow/dags:/opt/airflow/dags

      - ./airflow/logs:/opt/airflow/logs

      - ./scripts:/opt/airflow/scripts

      - ./config:/opt/airflow/config

      - ./data:/opt/airflow/data

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin123
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@bank.com || true &&
      airflow standalone
      "

    networks:

      - banking_network

#################################################

# NETWORK

#################################################

networks:

  banking_network:

#################################################

# VOLUME

#################################################

volumes:

  postgres_data:

  airflow_postgres: